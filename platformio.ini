; PlatformIO multi-env monorepo for NU Baja SAE firmware.
; Intentionally no default_envs: bare `pio run` without -e must not
; silently flash the wrong board. Always run `pio run -e <board> -t upload`.
;
; PlatformIO does not support a per-environment `src_dir` (it's a
; [platformio]-section-only option), so all board source lives under a
; shared `src_dir = boards` and each env selects its board via
; `build_src_filter`.

[platformio]
src_dir = boards
lib_dir = lib

[env:ecvt-controller]
platform = espressif32
board = nodemcu-32s
framework = arduino
build_src_filter = -<*> +<ecvt-controller/src>
build_flags = -D BOARD_ID=ECVT_CONTROLLER

[env:daq-node]
platform = espressif32
board = nodemcu-32s
framework = arduino
build_src_filter = -<*> +<daq-node/src>
build_flags = -D BOARD_ID=DAQ_NODE

[env:hud-node]
platform = espressif32
board = nodemcu-32s
framework = arduino
build_src_filter = -<*> +<hud-node/src>
build_flags = -D BOARD_ID=HUD_NODE
