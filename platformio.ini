; PlatformIO multi-env monorepo for NU Baja SAE firmware.
; Intentionally no default_envs: bare `pio run` without -e must not
; silently flash the wrong board. Always run `pio run -e <board> -t upload`.

[platformio]
lib_dir = lib

[env:ecvt-controller]
platform = ststm32
board = TBD
framework = arduino
src_dir = boards/ecvt-controller/src
build_flags = -D BOARD_ID=ECVT_CONTROLLER

[env:daq-node]
platform = ststm32
board = TBD
framework = arduino
src_dir = boards/daq-node/src
build_flags = -D BOARD_ID=DAQ_NODE

[env:hud-node]
platform = ststm32
board = TBD
framework = arduino
src_dir = boards/hud-node/src
build_flags = -D BOARD_ID=HUD_NODE

[env:telemetry-node]
platform = ststm32
board = TBD
framework = arduino
src_dir = boards/telemetry-node/src
build_flags = -D BOARD_ID=TELEMETRY_NODE
